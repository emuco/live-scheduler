services:
  scheduler:
    build: .
    container_name: live-scheduler
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3500
      REDIS_URL: redis://redis:6379
    ports:
      - "${APP_PORT:-3500}:3500"
    volumes:
      - live-scheduler-data:/app/data
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: live-scheduler-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - live-scheduler-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  live-scheduler-data:
  live-scheduler-redis-data:
