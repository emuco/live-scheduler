services:
  scheduler:
    build: .
    container_name: live-scheduler
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3500
      REDIS_URL: redis://redis:6379
    ports:
      - "${APP_PORT:-3500}:3500"
    volumes:
      - live-scheduler-data:/app/data
    depends_on:
      redis:
        condition: service_healthy

volumes:
  live-scheduler-data:
  live-scheduler-redis-data:
