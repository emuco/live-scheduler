services:
  scheduler:
    build: .
    container_name: live-scheduler
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3500
    ports:
      - "${APP_PORT:-3500}:3500"
    volumes:
      - live-scheduler-data:/app/data

volumes:
  live-scheduler-data:
